<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Save the Princess</title>
  <link rel="icon" type="image/png" href="img/favicon-princess.png" />
  <style>
    @font-face {
      font-family: 'Press Start 2P';
      src: url('fonts/PressStart2P.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      position: relative;
      overflow: hidden;
    }
    canvas {
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
      z-index: 60;
    }
    #controls-info {
      position: fixed;
      right: 12px;
      bottom: 40px;
      z-index: 50;
      color: #555;
      font-size: 10px;
      line-height: 1.4;
      font-family: monospace;
      text-align: right;
      white-space: pre-line;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
      -webkit-touch-callout: none;
    }
    #github-link,
    #github-link a,
    #build-info {
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
      -webkit-touch-callout: none;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="controls-info"></div>
  <!-- GitHub link — fixed bottom-right -->
  <div id="github-link" style="position:fixed;bottom:24px;right:12px;z-index:50;">
    <a href="https://github.com/spotco/Save-the-Princess-Web" target="_blank"
       draggable="false"
       style="color:#444;font-size:10px;font-family:monospace;text-decoration:none;">
      github.com/spotco/Save-the-Princess-Web
    </a>
  </div>
  <div id="build-info" style="position:fixed;bottom:8px;right:12px;color:#444;font-size:10px;font-family:monospace;z-index:50;"></div>
  <script>
    fetch('https://api.github.com/repos/spotco/Save-the-Princess-Web/commits/HEAD')
      .then(r => r.json())
      .then(d => {
        var date = new Date(d.commit.committer.date);
        document.getElementById('build-info').textContent = 'last commit: ' + date.toLocaleString();
      })
      .catch(function() {});
  </script>
  <!-- Phaser 3.90.0 loaded from local lib/ -->
  <script src="lib/phaser.min.js"></script>
  <script type="module" src="src/Main.js"></script>
</body>
</html>
